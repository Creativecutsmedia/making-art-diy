[build]
  command = "pip install -r requirements.txt && python3 update-products.py && npm install && npm run build:admin"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/_products/*"
  to = "/"
  status = 404
  force = true

[[edge_functions]]
  path = "/admin-v2/*"
  excludedPath = ["/admin-v2/", "/admin-v2/index.html", "/admin-v2/styles.css", "/admin-v2/dist/*"]
  function = "admin-v2-guard"
